basePath: /api/v1
definitions:
  presentation.ErrorInfo:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  presentation.Response:
    properties:
      data: {}
      error:
        $ref: '#/definitions/presentation.ErrorInfo'
      success:
        type: boolean
    type: object
info:
  contact: {}
  description: REST API for user registration and login in Cookly Auth Service.
  title: Cookly Auth Service API
  version: "1.0"
paths:
  /login:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Authenticates user credentials and creates a session.
      parameters:
      - description: Email
        in: formData
        name: email
        required: true
        type: string
      - description: Password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presentation.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presentation.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presentation.Response'
      summary: Login user
      tags:
      - Authentication
  /register:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Creates a new user account.
      parameters:
      - description: Username
        in: formData
        name: username
        required: true
        type: string
      - description: Email
        in: formData
        name: email
        required: true
        type: string
      - description: Password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presentation.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presentation.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presentation.Response'
      summary: Register user
      tags:
      - Authentication
schemes:
- http
swagger: "2.0"
